<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A-SmartERP | Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { 
            font-family: 'Inter', sans-serif; 
            background: linear-gradient(135deg, #eef2f3 0%, #8e9eab 100%); 
            min-height: 100vh;
            color: #111827; 
        }
        
        /* App Icon Launcher Style */
        .app-icon {
            width: 70px;
            height: 70px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            color: white;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 8px 15px -3px rgba(0, 0, 0, 0.1);
        }

        .app-card:hover .app-icon {
            transform: scale(1.1) translateY(-5px);
            box-shadow: 0 15px 25px -5px rgba(0, 0, 0, 0.15);
        }

        .app-card p {
            font-size: 13px;
            font-weight: 600;
            margin-top: 10px;
            color: #1f2937;
            text-align: center;
            text-shadow: 0 1px 2px rgba(255,255,255,0.5);
        }

        /* Frosted Glass Sidebar */
        .sidebar-card {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 28px;
        }

        .nav-link {
            font-size: 14px;
            font-weight: 600;
            color: #4b5563;
        }
        .nav-link:hover { color: #875A7B; }
    </style>
</head>
<body x-data="{ userMenu: false }">

    <header class="flex justify-between items-center px-8 py-4 bg-white/60 backdrop-blur-md sticky top-0 z-50 border-b border-white/20">
        <div class="flex items-center gap-10">
            <h1 class="text-xl font-black text-[#875A7B]">A-Smart<span class="text-slate-900 font-medium">ERP</span></h1>
            <nav class="hidden md:flex gap-8">
                <a href="/dashboard" class="nav-link">Apps</a>
                <a href="#" class="nav-link">Community</a>
                <a href="#" class="nav-link">Support</a>
            </nav>
        </div>
        
        <div class="flex items-center gap-6">
            <div class="relative">
                <button @click="userMenu = !userMenu" class="flex items-center gap-2">
                    <img src="https://ui-avatars.com/api/?name={{ name }}&background=875A7B&color=fff" class="w-8 h-8 rounded-lg shadow-sm">
                    <span class="text-sm font-bold text-gray-700 hidden sm:inline">{{ name }}</span>
                    <i class="fa-solid fa-chevron-down text-[10px] text-gray-400"></i>
                </button>
                <div x-show="userMenu" @click.away="userMenu = false" class="absolute right-0 mt-2 w-48 bg-white rounded-xl shadow-xl border p-2">
                    <a href="/logout" class="block px-4 py-2 text-sm font-bold text-red-600 hover:bg-red-50 rounded-lg">Logout</a>
                </div>
            </div>
        </div>
    </header>

    <main class="max-w-[1400px] mx-auto px-8 py-16 flex flex-col lg:flex-row gap-12">
        
        <div class="flex-grow">
            <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 xl:grid-cols-6 gap-y-16 gap-x-8">
                
                <a href="/accounting" class="app-card flex flex-col items-center group">
                    <div class="app-icon bg-gradient-to-br from-sky-500 to-blue-600">
                        <i class="fa-solid fa-file-invoice"></i>
                    </div>
                    <p>accounting</p>
                </a>

                <a href="#" class="app-card flex flex-col items-center group">
                    <div class="app-icon bg-gradient-to-br from-indigo-500 to-indigo-700">
                        <i class="fa-solid fa-users"></i>
                    </div>
                    <p>CRM</p>
                </a>

                <a href="#" class="app-card flex flex-col items-center group">
                    <div class="app-icon bg-gradient-to-br from-purple-500 to-indigo-600">
                        <i class="fa-solid fa-user-tie"></i>
                    </div>
                    <p>Employees</p>
                </a>

                <a href="#" class="app-card flex flex-col items-center group">
                    <div class="app-icon bg-gradient-to-br from-slate-600 to-slate-800">
                        <i class="fa-solid fa-industry"></i>
                    </div>
                    <p>Manufacturing</p>
                </a>

                <a href="#" class="app-card flex flex-col items-center group">
                    <div class="app-icon bg-gradient-to-br from-amber-400 to-orange-500">
                        <i class="fa-solid fa-briefcase"></i>
                    </div>
                    <p>Project</p>
                </a>

                <a href="#" class="app-card flex flex-col items-center group">
                    <div class="app-icon bg-gradient-to-br from-blue-400 to-cyan-500">
                        <i class="fa-solid fa-comment-dots"></i>
                    </div>
                    <p>Discuss</p>
                </a>

                <a href="#" class="app-card flex flex-col items-center group">
                    <div class="app-icon bg-gradient-to-br from-slate-400 to-slate-500">
                        <i class="fa-solid fa-sliders"></i>
                    </div>
                    <p>Settings</p>
                </a>

            </div>
        </div>

        <aside class="w-full lg:w-80">
            <div class="sidebar-card p-10 shadow-sm">
                <div class="flex flex-col items-center text-center mb-10">
                    <div class="w-20 h-20 bg-[#875A7B] text-white text-3xl font-black flex items-center justify-center rounded-2xl shadow-lg mb-4">
                        A
                    </div>
                    <h3 class="text-xl font-bold text-slate-900 leading-tight">Atharv Tech Co.</h3>
                    <p class="text-[10px] font-black uppercase text-[#875A7B] tracking-widest mt-1">SaaS Administrator</p>
                </div>

                <div class="space-y-6">
                    <div class="flex items-center gap-4 text-sm text-slate-700">
                        <i class="fa-solid fa-location-dot w-5 text-[#875A7B]"></i>
                        <span class="font-medium">New Delhi, India</span>
                    </div>
                    <div class="flex items-center gap-4 text-sm text-slate-700">
                        <i class="fa-solid fa-phone w-5 text-[#875A7B]"></i>
                        <span class="font-medium">+91 93107 21874</span>
                    </div>
                    <div class="flex items-center gap-4 text-sm text-slate-700">
                        <i class="fa-solid fa-envelope w-5 text-[#875A7B]"></i>
                        <span class="font-medium truncate">care.atc1@gmail.com</span>
                    </div>
                </div>

                <div class="mt-12 pt-8 border-t border-white/30">
                    <div class="flex justify-between items-center bg-white/40 p-3 rounded-xl border border-white/50">
                        <span class="text-[10px] font-bold text-slate-500 uppercase">Cloud Sync</span>
                        <div class="flex items-center gap-1">
                            <span class="w-1.5 h-1.5 bg-green-500 rounded-full"></span>
                            <span class="text-[10px] font-bold text-green-600 uppercase">Active</span>
                        </div>
                    </div>
                </div>
            </div>
        </aside>

    </main>

</body>
</html>
