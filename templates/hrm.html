<tbody class="divide-y divide-slate-100">
    {% for s in staff_list %}
    <tr class="hover:bg-blue-50/20 transition">
        <td class="p-4">
            <span class="font-bold text-blue-600">{{ s.info.emp_code }}</span>
            <p class="font-bold text-slate-800">{{ s.info.name }}</p>
        </td>
        <td class="p-4 font-bold text-green-600">₹{{ s.earned }}</td>
        <td class="p-4 text-right space-x-3">
            <button @click="editModal = true; editData = {id: '{{s.info.id}}', name: '{{s.info.name}}', salary: '{{s.info.salary}}', address: '{{s.info.address}}'}" 
                    class="text-blue-500 hover:text-blue-700">
                <i class="fas fa-edit text-lg"></i>
            </button>
            <a href="/delete-staff/{{ s.info.id }}" onclick="return confirm('Are you sure?')" class="text-red-400 hover:text-red-600">
                <i class="fas fa-trash-alt text-lg"></i>
            </a>
        </td>
    </tr>
    {% endfor %}
</tbody>
