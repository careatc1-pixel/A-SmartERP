<div x-data="{ tab: 'workforce' }" class="p-8">
    <div class="flex gap-4 mb-8 bg-slate-100 p-2 rounded-2xl w-fit">
        <button @click="tab = 'workforce'" :class="tab == 'workforce' ? 'bg-white shadow-sm' : ''" class="px-6 py-2 rounded-xl font-bold text-xs uppercase tracking-widest transition-all">Workforce</button>
        <button @click="tab = 'onboarding'" :class="tab == 'onboarding' ? 'bg-white shadow-sm' : ''" class="px-6 py-2 rounded-xl font-bold text-xs uppercase tracking-widest transition-all">Onboarding Kit</button>
        <button @click="tab = 'tasks'" :class="tab == 'tasks' ? 'bg-white shadow-sm' : ''" class="px-6 py-2 rounded-xl font-bold text-xs uppercase tracking-widest transition-all">BTL Tasks</button>
    </div>

    <div x-show="tab == 'workforce'" class="animate__animated animate__fadeIn">
        </div>

    <div x-show="tab == 'onboarding'" class="animate__animated animate__fadeIn">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <div class="glass-card p-8">
                <h3 class="font-black italic mb-4">Joining Kit Checklist</h3>
                <div class="space-y-4">
                    <label class="flex items-center gap-3 font-bold text-sm text-slate-600">
                        <input type="checkbox" class="w-5 h-5 rounded-lg"> Laptop Issued
                    </label>
                    <label class="flex items-center gap-3 font-bold text-sm text-slate-600">
                        <input type="checkbox" class="w-5 h-5 rounded-lg"> SIM Card Provided
                    </label>
                    <label class="flex items-center gap-3 font-bold text-sm text-slate-600">
                        <input type="checkbox" class="w-5 h-5 rounded-lg"> [Aadhaar Redacted] Document Verified
                    </label>
                </div>
            </div>
            <div class="glass-card p-8 bg-slate-900 text-white">
                <h3 class="font-black italic text-blue-400 mb-2">Offer Letter Engine</h3>
                <p class="text-[10px] uppercase font-bold tracking-widest mb-6">Generate official PDFs in 1-click</p>
                <a href="/generate-offer/1" class="inline-block bg-blue-600 p-4 rounded-xl font-bold text-xs uppercase italic">Download PDF Sample</a>
            </div>
        </div>
    </div>

    <div x-show="tab == 'tasks'" class="animate__animated animate__fadeIn">
        <div class="glass-card p-0 overflow-hidden">
            <div class="p-8 border-b border-slate-50 flex justify-between">
                <h3 class="font-black italic">BTL Terminal</h3>
                <span class="bg-red-100 text-red-600 px-3 py-1 rounded-full text-[9px] font-bold uppercase tracking-widest">3 High Priority</span>
            </div>
            </div>
    </div>
</div>
