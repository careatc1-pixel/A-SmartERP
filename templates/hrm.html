<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A-SmartERP | Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; margin: 0; }
        .sidebar { background: #020617; width: 260px; height: 100vh; position: fixed; }
        .content { margin-left: 260px; padding: 40px; }
        .glass { background: white; border-radius: 1.5rem; border: 1px solid #f1f5f9; box-shadow: 0 4px 20px rgba(0,0,0,0.03); }
        [x-cloak] { display: none !important; }
    </style>
</head>
<body x-data="{ tab: 'workforce', modal: false }">

    <aside class="sidebar text-slate-400 flex flex-col shadow-2xl">
        <div class="p-8 border-b border-slate-800/50 text-white italic font-black">A-Smart<span class="text-blue-500 text-lg">ERP</span></div>
        <nav class="flex-grow p-4 space-y-2">
            <button @click="tab = 'workforce'" :class="tab == 'workforce' ? 'bg-blue-600 text-white' : ''" class="w-full text-left p-4 rounded-xl font-bold text-sm transition-all">
                <i class="fas fa-users mr-3"></i> Workforce
            </button>
            <button @click="tab = 'onboarding'" :class="tab == 'onboarding' ? 'bg-blue-600 text-white' : ''" class="w-full text-left p-4 rounded-xl font-bold text-sm transition-all">
                <i class="fas fa-rocket mr-3"></i> Onboarding Kit
            </button>
            <a href="/logout" class="flex items-center gap-4 p-4 text-red-500 mt-10 font-bold text-sm">
                <i class="fas fa-power-off"></i> Logout
            </a>
        </nav>
    </aside>

    <main class="content">
        <div x-show="tab == 'workforce'">
            <header class="flex justify-between items-center mb-10">
                <h2 class="text-3xl font-black italic">Workforce <span class="text-blue-600 font-light">HQ</span></h2>
                <button @click="modal = true" class="bg-blue-600 text-white px-8 py-3 rounded-2xl font-bold shadow-xl italic">Onboard Staff</button>
            </header>

            <div class="glass overflow-hidden">
                <table class="w-full text-left">
                    <thead class="bg-slate-50 text-slate-400 text-[9px] font-bold uppercase tracking-widest border-b italic">
                        <tr><th class="p-6">Employee</th><th class="p-6">Designation</th><th class="p-6 text-right">Offer Letter</th></tr>
                    </thead>
                    <tbody>
                        {% for s in staff %}
                        <tr class="hover:bg-slate-50 transition border-b group">
                            <td class="p-6 font-bold text-slate-800 italic">{{ s.name }} <br><span class="text-[9px] text-blue-500 uppercase">{{ s.emp_code }}</span></td>
                            <td class="p-6 text-sm italic text-slate-500">{{ s.designation }}</td>
                            <td class="p-6 text-right">
                                <a href="/generate-offer/{{ s.id }}" class="text-blue-600 hover:text-blue-800 font-black text-xs italic border-b-2 border-blue-100"><i class="fas fa-file-pdf mr-1"></i> Generate PDF</a>
                            </td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>

        <div x-show="tab == 'onboarding'" x-cloak>
            <h2 class="text-3xl font-black italic mb-10 text-slate-900">Joining <span class="text-blue-600 font-light italic">Kit Tracker</span></h2>
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                {% for s in staff %}
                <div class="glass p-6">
                    <h4 class="font-black italic mb-4 border-b pb-2">{{ s.name }}</h4>
                    <div class="space-y-3">
                        <div class="flex justify-between items-center text-[10px] font-bold uppercase">
                            <span>Laptop</span>
                            <i class="fas {{ 'fa-check text-green-500' if s.laptop_issued else 'fa-times text-slate-300' }}"></i>
                        </div>
                        <div class="flex justify-between items-center text-[10px] font-bold uppercase">
                            <span>SIM Card</span>
                            <i class="fas {{ 'fa-check text-green-500' if s.sim_issued else 'fa-times text-slate-300' }}"></i>
                        </div>
                        <div class="flex justify-between items-center text-[10px] font-bold uppercase">
                            <span>ID Card</span>
                            <i class="fas {{ 'fa-check text-green-500' if s.id_card_issued else 'fa-times text-slate-300' }}"></i>
                        </div>
                    </div>
                </div>
                {% endfor %}
            </div>
        </div>
    </main>

    <div x-show="modal" x-cloak class="fixed inset-0 z-[100] flex justify-end">
        <div @click="modal = false" class="absolute inset-0 bg-slate-900/40 backdrop-blur-sm"></div>
        <div class="relative w-full max-w-md bg-white h-full shadow-2xl p-10 overflow-y-auto animate__animated animate__slideInRight">
            <h3 class="text-2xl font-black italic mb-6 border-b pb-4">Digital <span class="text-blue-600">Onboarding</span></h3>
            <form method="POST" class="space-y-4">
                <input type="text" name="name" placeholder="Full Name" required class="w-full bg-slate-50 p-4 rounded-xl text-sm italic font-bold border focus:border-blue-500 outline-none">
                <input type="text" name="designation" placeholder="Work Role" required class="w-full bg-slate-50 p-4 rounded-xl text-sm italic font-bold border focus:border-blue-500 outline-none">
                <input type="number" name="salary" placeholder="Monthly Salary (₹)" required class="w-full bg-slate-50 p-4 rounded-xl text-sm italic font-bold border focus:border-blue-500 outline-none">
                <input type="text" name="aadhaar" placeholder="Aadhaar Number" class="w-full bg-slate-50 p-4 rounded-xl text-sm italic font-bold border focus:border-blue-500 outline-none">
                <input type="text" name="bank" placeholder="Bank Account Number" class="w-full bg-slate-50 p-4 rounded-xl text-sm italic font-bold border focus:border-blue-500 outline-none">
                <textarea name="address" placeholder="Full Address" class="w-full bg-slate-50 p-4 rounded-xl text-sm italic font-bold border focus:border-blue-500 outline-none"></textarea>
                
                <div class="p-4 bg-slate-50 rounded-xl space-y-2">
                    <p class="text-[9px] font-bold text-slate-400 uppercase tracking-widest italic mb-2">Joining Kit Status</p>
                    <label class="flex items-center gap-3 text-[10px] font-bold italic"><input type="checkbox" name="laptop"> Laptop Issued</label>
                    <label class="flex items-center gap-3 text-[10px] font-bold italic"><input type="checkbox" name="sim"> SIM Card Issued</label>
                    <label class="flex items-center gap-3 text-[10px] font-bold italic"><input type="checkbox" name="id_card"> ID Card Issued</label>
                </div>
                <button type="submit" class="w-full bg-blue-600 text-white p-5 rounded-2xl font-bold uppercase italic tracking-widest shadow-xl">Enroll to Cloud</button>
            </form>
        </div>
    </div>
</body>
</html>
