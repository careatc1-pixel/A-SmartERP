<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>A-SmartERP | Master Control</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>body { font-family: sans-serif; font-size: 11px; }</style>
</head>
<body class="bg-slate-50 flex h-screen overflow-hidden">
    <aside class="w-64 bg-slate-900 text-white p-8 font-bold italic">
        <h1 class="text-blue-400 text-xl mb-10">A-SmartERP</h1>
        <nav class="space-y-4">
            <a href="/hrm" class="block bg-blue-600 p-3 rounded-xl"><i class="fas fa-users-cog mr-2"></i> HRM & Payroll</a>
            <a href="#" class="block text-slate-500 p-3"><i class="fas fa-boxes mr-2"></i> Inventory</a>
            <a href="#" class="block text-slate-500 p-3"><i class="fas fa-file-invoice-dollar mr-2"></i> Invoicing</a>
        </nav>
    </aside>

    <main class="flex-1 p-8 overflow-y-auto">
        <div class="grid grid-cols-12 gap-8">
            <div class="col-span-4 bg-white p-6 rounded-3xl shadow-sm border">
                <h3 class="font-bold mb-4 text-slate-500 uppercase italic">Onboarding</h3>
                <form method="POST" class="space-y-3">
                    <input type="text" name="name" placeholder="Name" required class="w-full p-2 bg-slate-100 rounded-lg">
                    <input type="number" name="salary" placeholder="Salary" required class="w-full p-2 bg-slate-100 rounded-lg">
                    <textarea name="address" placeholder="Address" class="w-full p-2 bg-slate-100 rounded-lg"></textarea>
                    <button class="w-full bg-slate-900 text-white p-3 rounded-xl font-bold uppercase italic">Confirm</button>
                </form>
            </div>

            <div class="col-span-8 bg-white rounded-3xl shadow-sm border overflow-hidden">
                <table class="w-full text-left">
                    <thead class="bg-slate-50 border-b text-[9px] uppercase">
                        <tr><th class="p-4">Staff</th><th class="p-4">Earnings</th><th class="p-4 text-right">Reports</th></tr>
                    </thead>
                    <tbody>
                        {% for s in staff_list %}
                        <tr class="border-b hover:bg-slate-50 transition">
                            <td class="p-4 font-bold text-blue-600">{{ s.info.emp_code }} - {{ s.info.name }}</td>
                            <td class="p-4 font-bold text-green-600">₹{{ s.earned }}</td>
                            <td class="p-4 text-right"><i class="fas fa-file-pdf text-red-400"></i></td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>
    </main>
</body>
</html>
