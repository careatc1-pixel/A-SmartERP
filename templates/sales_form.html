<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Billing | A-SmartERP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f1f5f9; }
        .print-only { display: none; }
        @media print {
            .no-print { display: none; }
            .print-only { display: block; }
            body { background: white; padding: 0; }
            .invoice-card { box-shadow: none; border: none; width: 100%; }
        }
    </style>
</head>
<body class="p-4 md:p-10">

    <div class="max-w-5xl mx-auto bg-white rounded-[2rem] shadow-2xl overflow-hidden invoice-card" 
         x-data="invoiceSystem()">
        
        <div class="p-8 border-b flex justify-between items-center bg-slate-50 no-print">
            <div>
                <h2 class="text-3xl font-black text-slate-900 italic">Smart <span class="text-[#875A7B]">GST Billing</span></h2>
            </div>
            <div class="flex gap-4">
                <button @click="window.print()" x-show="isSaved" class="bg-emerald-500 text-white px-6 py-2 rounded-xl font-bold text-sm shadow-lg">
                    <i class="fa-solid fa-download mr-2"></i> Download PDF
                </button>
                <a href="/accounting" class="text-slate-400 hover:text-red-500 mt-2"><i class="fa-solid fa-circle-xmark text-2xl"></i></a>
            </div>
        </div>

        <div class="p-6 md:p-12" id="invoice-area">
            <div class="flex justify-between mb-12">
                <div>
                    <h1 class="text-4xl font-black text-[#875A7B] mb-2">Atharv Tech Co.</h1>
                    <p class="text-xs text-slate-500 font-bold uppercase tracking-widest">New Delhi, India | care.atc1@gmail.com</p>
                </div>
                <div class="text-right">
                    <h2 class="text-xl font-bold text-slate-900">TAX INVOICE</h2>
                    <p class="text-sm text-slate-500" x-text="'No: ' + invNo"></p>
                    <p class="text-sm text-slate-500" x-text="'Date: ' + new Date().toLocaleDateString()"></p>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-8 mb-12 no-print">
                <div class="space-y-2">
                    <label class="text-[10px] font-bold text-slate-400 uppercase">Customer Name</label>
                    <input type="text" x-model="clientName" placeholder="Business / Client Name" 
                           class="w-full bg-slate-50 p-4 rounded-2xl border-none ring-2 ring-slate-100 focus:ring-[#875A7B] outline-none font-bold">
                </div>
            </div>
            <div class="print-only mb-8">
                <p class="text-xs font-bold text-slate-400 uppercase">Bill To:</p>
                <p class="text-xl font-bold text-slate-900" x-text="clientName"></p>
            </div>

            <div class="overflow-x-auto">
                <table class="w-full">
                    <thead>
                        <tr class="text-left text-[10px] font-bold text-slate-400 uppercase tracking-widest border-b">
                            <th class="pb-4 px-2">Description</th>
                            <th class="pb-4 px-2 w-20 text-center">Qty</th>
                            <th class="pb-4 px-2 w-32">Price</th>
                            <th class="pb-4 px-2 w-32">GST %</th>
                            <th class="pb-4 px-2 w-32 text-right">Total</th>
                            <th class="pb-4 px-2 w-10 no-print"></th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-slate-50">
                        <template x-for="(item, index) in items" :key="index">
                            <tr>
                                <td class="py-4 px-2">
                                    <input type="text" x-model="item.name" class="w-full bg-transparent border-none outline-none font-bold text-slate-700">
                                </td>
                                <td class="py-4 px-2">
                                    <input type="number" x-model.number="item.qty" @input="calculate()" class="w-full bg-transparent text-center font-bold">
                                </td>
                                <td class="py-4 px-2">
                                    <input type="number" x-model.number="item.price" @input="calculate()" class="w-full bg-transparent font-bold">
                                </td>
                                <td class="py-4 px-2">
                                    <select x-model.number="item.gstSlab" @change="calculate()" class="bg-slate-50 p-2 rounded-lg font-bold text-xs outline-none no-print">
                                        <option value="0">0% (Nil)</option>
                                        <option value="5">5%</option>
                                        <option value="12">12%</option>
                                        <option value="18">18%</option>
                                        <option value="28">28%</option>
                                    </select>
                                    <span class="print-only" x-text="item.gstSlab + '%'"></span>
                                </td>
                                <td class="py-4 px-2 text-right font-black italic text-slate-900" 
                                    x-text="'₹' + (item.qty * item.price * (1 + item.gstSlab/100)).toFixed(2)"></td>
                                <td class="py-4 px-2 text-right no-print">
                                    <button @click="removeItem(index)" class="text-slate-300 hover:text-red-500"><i class="fa-solid fa-trash"></i></button>
                                </td>
                            </tr>
                        </template>
                    </tbody>
                </table>
            </div>

            <button @click="addItem()" class="mt-6 text-[#875A7B] font-bold text-xs uppercase no-print">+ Add Row</button>

            <div class="mt-12 pt-8 border-t flex flex-col items-end">
                <div class="w-full md:w-80 space-y-3">
                    <div class="flex justify-between font-bold text-slate-500"><span>Subtotal:</span><span x-text="'₹' + subtotal.toFixed(2)"></span></div>
                    <div class="flex justify-between font-bold text-slate-500"><span>Total GST:</span><span x-text="'₹' + totalGst.toFixed(2)"></span></div>
                    <div class="flex justify-between text-3xl font-black text-[#875A7B] pt-4 border-t-2 italic"><span>Grand Total:</span><span x-text="'₹' + total.toFixed(2)"></span></div>
                </div>
            </div>

            <button @click="saveAndPrint()" x-show="!isSaved" 
                    class="w-full bg-slate-900 text-white p-6 rounded-2xl font-black italic uppercase tracking-widest mt-12 no-print shadow-xl">
                Validate & Save Invoice
            </button>
        </div>
    </div>

    <script>
        function invoiceSystem() {
            return {
                clientName: '',
                invNo: 'INV-' + Math.floor(1000 + Math.random() * 9000),
                items: [{ name: 'Service/Product', qty: 1, price: 0, gstSlab: 18 }],
                subtotal: 0,
                totalGst: 0,
                total: 0,
                isSaved: false,

                addItem() { this.items.push({ name: '', qty: 1, price: 0, gstSlab: 18 }); },
                removeItem(i) { if(this.items.length > 1) this.items.splice(i, 1); this.calculate(); },

                calculate() {
                    this.subtotal = this.items.reduce((acc, item) => acc + (item.qty * item.price), 0);
                    this.totalGst = this.items.reduce((acc, item) => acc + (item.qty * item.price * (item.gstSlab / 100)), 0);
                    this.total = this.subtotal + this.totalGst;
                },

                async saveAndPrint() {
                    if(!this.clientName) return alert('Customer name missing!');
                    
                    const response = await fetch('/api/save-sale', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            client: this.clientName,
                            inv_no: this.invNo,
                            total: this.total,
                            gst: this.totalGst
                        })
                    });

                    if(response.ok) {
                        this.isSaved = true;
                        alert('Invoice Saved in Database!');
                        // Print trigger directly converts to PDF in browser
                        setTimeout(() => { window.print(); }, 500);
                    }
                }
            }
        }
    </script>
</body>
</html>
