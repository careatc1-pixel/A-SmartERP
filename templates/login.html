<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A-SmartERP | Secure Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: #020617; /* Deep Dark Blue */
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        .login-card {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 2rem;
            width: 100%;
            max-width: 400px;
            padding: 3rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .input-group focus-within {
            border-color: #3b82f6;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
        }
    </style>
</head>
<body>

    <div class="login-card animate__animated animate__fadeInUp">
        <div class="text-center mb-10">
            <h1 class="text-3xl font-black italic text-white tracking-tighter">A-Smart<span class="text-blue-500">ERP</span></h1>
            <p class="text-slate-500 text-[10px] font-bold uppercase tracking-widest mt-2">Invoicing Control Terminal</p>
        </div>

        <form method="POST" class="space-y-6">
            <div class="space-y-2">
                <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-1">Identity</label>
                <div class="flex items-center bg-slate-900/50 border border-slate-800 rounded-2xl p-4 transition-all">
                    <i class="fas fa-user text-slate-600 mr-4"></i>
                    <input type="text" name="username" placeholder="Username" required 
                           class="bg-transparent border-none outline-none text-white w-full font-semibold text-sm">
                </div>
            </div>

            <div class="space-y-2">
                <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-1">Access Key</label>
                <div class="flex items-center bg-slate-900/50 border border-slate-800 rounded-2xl p-4 transition-all">
                    <i class="fas fa-lock text-slate-600 mr-4"></i>
                    <input type="password" name="password" placeholder="Password" required 
                           class="bg-transparent border-none outline-none text-white w-full font-semibold text-sm">
                </div>
            </div>

            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-black italic py-5 rounded-2xl transition-all shadow-xl shadow-blue-900/20 transform active:scale-95">
                ENTER TERMINAL <i class="fas fa-arrow-right ml-2"></i>
            </button>
        </form>

        <div class="mt-10 text-center">
            <p class="text-slate-600 text-[9px] font-bold uppercase tracking-tighter">
                &copy; 2026 Atharv Tech Co. | Secure Infrastructure
            </p>
        </div>
    </div>

    <div class="absolute top-0 left-0 w-64 h-64 bg-blue-600/10 rounded-full blur-3xl -z-10 -translate-x-1/2 -translate-y-1/2"></div>
    <div class="absolute bottom-0 right-0 w-96 h-96 bg-blue-900/10 rounded-full blur-3xl -z-10 translate-x-1/3 translate-y-1/3"></div>

</body>
</html>
