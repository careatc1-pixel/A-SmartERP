<!DOCTYPE html>
<html>
<body style="font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; background: #f0f2f5;">
    <form method="POST" style="background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1);">
        <h2 style="text-align: center; font-style: italic;">A-SmartERP Login</h2>
        <input type="text" name="username" placeholder="Admin Username" required style="width: 100%; padding: 10px; margin: 10px 0;"><br>
        <input type="password" name="password" placeholder="Password" required style="width: 100%; padding: 10px; margin: 10px 0;"><br>
        <button type="submit" style="width: 100%; padding: 10px; background: #2563eb; color: white; border: none; cursor: pointer;">Login</button>
    </form>
</body>
</html>
