<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terminal | A-SmartERP Pro</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: #f1f5f9; /* Slate 100 Background */
            color: #1e293b;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        /* Glassmorphism Logic */
        .glass-terminal {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
        }

        /* Responsive Container */
        .login-box {
            width: 100%;
            max-width: 420px; /* Force-fixed size on desktop */
            margin: 0 20px;
            animation: fadeInDown 0.6s;
        }

        /* Custom Input Styling */
        .input-atc {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            transition: all 0.2s ease;
        }

        .input-atc:focus {
            background: white;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
            outline: none;
        }

        /* Compact Title */
        .atc-logo {
            font-size: 20px;
            font-weight: 800;
            font-style: italic;
            tracking-tight;
            color: #0f172a;
        }

        [x-cloak] { display: none !important; }
    </style>
</head>
<body class="bg-slate-50">

    <div class="login-box animate__animated animate__fadeInDown">
        
        <div class="glass-terminal rounded-3xl p-8 sm:p-10 relative">
            
            <div class="text-center mb-8 pb-4 border-b border-slate-100">
                <div class="flex items-center justify-center gap-2">
                    <div class="w-8 h-8 bg-blue-600 rounded-xl flex items-center justify-center text-white text-xs font-bold shadow-lg shadow-blue-500/30">
                        <i class="fas fa-microchip"></i>
                    </div>
                    <span class="atc-logo">A-Smart<span class="text-blue-500">ERP</span></span>
                </div>
                <span class="text-[9px] font-bold text-slate-400 uppercase tracking-widest mt-1 inline-block italic">Pro Terminal v1.0</span>
            </div>

            <div class="mb-6">
                <h2 class="text-2xl font-black text-slate-900 tracking-tight italic">Initialize Login</h2>
                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mt-1">Authorized access only</p>
            </div>

            <form method="POST" class="space-y-6">
                
                <div>
                    <label class="text-[10px] font-bold text-slate-500 uppercase block mb-1.5 tracking-wide">Authorized ID</label>
                    <div class="relative">
                        <i class="fas fa-user-circle absolute left-4 top-4 text-slate-300"></i>
                        <input type="text" name="username" placeholder="admin" required 
                               class="input-atc w-full p-3.5 pl-12 rounded-xl text-xs font-semibold italic text-slate-700">
                    </div>
                </div>

                <div>
                    <label class="text-[10px] font-bold text-slate-500 uppercase block mb-1.5 tracking-wide">Secure Password</label>
                    <div class="relative">
                        <i class="fas fa-lock absolute left-4 top-4 text-slate-300"></i>
                        <input type="password" name="password" placeholder="••••••••" required 
                               class="input-atc w-full p-3.5 pl-12 rounded-xl text-xs font-semibold italic text-slate-700">
                    </div>
                </div>

                <div class="flex items-center justify-between text-[10px] font-bold uppercase py-1">
                    <label class="flex items-center gap-1.5 text-slate-500 cursor-pointer">
                        <input type="checkbox" class="w-3.5 h-3.5 rounded border-slate-300 text-blue-600 focus:ring-blue-500">
                        Stay Connected
                    </label>
                    <a href="#" class="text-blue-600 hover:text-blue-700 transition italic">Need Help?</a>
                </div>

                <button type="submit" class="w-full bg-slate-950 text-white p-4 rounded-xl font-bold uppercase italic tracking-widest shadow-xl shadow-slate-200 hover:bg-black transition-all active:scale-[0.98] text-xs">
                    Connect to Terminal <i class="fas fa-arrow-right ml-2 text-blue-400"></i>
                </button>
            </form>
        </div>

        <div class="text-center mt-6 text-[10px] font-bold text-slate-400 uppercase tracking-widest">
            Developed by <span class="text-slate-700">Atharv Tech Co.</span>
        </div>

    </div>

</body>
</html>
