<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | A-SmartERP Premium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap');
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: #ffffff;
            overflow: hidden;
        }

        /* Animated Background Shapes */
        .shape {
            position: absolute;
            filter: blur(80px);
            z-index: -1;
            animation: float 10s infinite alternate;
        }
        .shape-1 { width: 300px; height: 300px; background: #875A7B; opacity: 0.15; top: -50px; left: -50px; }
        .shape-2 { width: 400px; height: 400px; background: #008784; opacity: 0.1; bottom: -100px; right: -50px; }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(30px, 50px) scale(1.1); }
        }

        .login-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 25px 50px -12px rgba(135, 90, 123, 0.15);
        }

        .input-group:focus-within label {
            color: #875A7B;
            transform: translateY(-2px);
        }
        
        .btn-premium {
            background: #875A7B;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .btn-premium:hover {
            background: #704a66;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -5px rgba(135, 90, 123, 0.4);
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-6">

    <div class="shape shape-1"></div>
    <div class="shape shape-2"></div>

    <div class="max-w-5xl w-full grid md:grid-cols-2 gap-12 items-center">
        
        <div class="hidden md:block space-y-8">
            <div class="inline-flex items-center gap-2 bg-slate-100 px-4 py-2 rounded-full">
                <span class="w-2 h-2 bg-[#875A7B] rounded-full animate-ping"></span>
                <span class="text-[10px] font-black uppercase tracking-widest text-slate-500">v2.0 Enterprise SaaS</span>
            </div>
            
            <h1 class="text-6xl font-extrabold text-slate-900 tracking-tighter leading-none">
                All your business <br> on <span class="text-[#875A7B] italic">one platform.</span>
            </h1>
            
            <p class="text-lg text-slate-500 font-medium max-w-md">
                Experience the next generation of business automation. Simple, efficient, and tailored for growth.
            </p>

            <div class="flex gap-6 items-center">
                <div class="flex -space-x-3">
                    <img class="w-10 h-10 rounded-full border-4 border-white shadow-sm" src="https://i.pravatar.cc/100?u=1" alt="">
                    <img class="w-10 h-10 rounded-full border-4 border-white shadow-sm" src="https://i.pravatar.cc/100?u=2" alt="">
                    <img class="w-10 h-10 rounded-full border-4 border-white shadow-sm" src="https://i.pravatar.cc/100?u=3" alt="">
                </div>
                <p class="text-sm font-bold text-slate-400 uppercase tracking-tight">Trusted by 500+ ATC Clients</p>
            </div>
        </div>

        <div class="login-card p-10 md:p-14 rounded-[3rem]">
            <div class="mb-10 text-center md:text-left">
                <h2 class="text-3xl font-black text-slate-900 mb-2">Welcome Back</h2>
                <p class="text-slate-400 font-medium">Please enter your credentials to continue</p>
            </div>

            <form action="/login" method="POST" class="space-y-6">
                <div class="input-group">
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1 mb-2 block transition-all">Username</label>
                    <div class="relative">
                        <i class="fa-solid fa-user absolute left-4 top-1/2 -translate-y-1/2 text-slate-300"></i>
                        <input type="text" name="username" required
                            class="w-full pl-12 pr-4 py-4 bg-white border border-slate-100 rounded-2xl outline-none focus:border-[#875A7B] focus:ring-4 focus:ring-[#875A7B]/5 transition-all font-semibold"
                            placeholder="vikas_atc">
                    </div>
                </div>

                <div class="input-group">
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1 mb-2 block transition-all">Password</label>
                    <div class="relative">
                        <i class="fa-solid fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-slate-300"></i>
                        <input type="password" name="password" required
                            class="w-full pl-12 pr-4 py-4 bg-white border border-slate-100 rounded-2xl outline-none focus:border-[#875A7B] focus:ring-4 focus:ring-[#875A7B]/5 transition-all font-semibold"
                            placeholder="••••••••">
                    </div>
                </div>

                <div class="flex items-center justify-between py-2">
                    <label class="flex items-center gap-2 cursor-pointer group">
                        <input type="checkbox" class="w-4 h-4 rounded border-slate-300 text-[#875A7B] focus:ring-[#875A7B]">
                        <span class="text-xs font-bold text-slate-400 group-hover:text-slate-600 transition-colors">Remember me</span>
                    </label>
                    <a href="#" class="text-xs font-bold text-[#875A7B] hover:underline">Forgot password?</a>
                </div>

                <button type="submit" class="w-full btn-premium text-white py-5 rounded-2xl font-black uppercase tracking-[0.2em] shadow-xl text-xs">
                    Access Terminal <i class="fa-solid fa-arrow-right ml-2"></i>
                </button>
            </form>

            <div class="mt-10 pt-8 border-t border-slate-100 text-center">
                <p class="text-xs text-slate-400 font-bold uppercase tracking-widest">
                    Don't have an account? <a href="/register" class="text-[#875A7B] hover:underline">Sign Up Now</a>
                </p>
            </div>
        </div>

    </div>

</body>
</html>
