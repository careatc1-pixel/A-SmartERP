<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A-SmartERP | Business Management Platform</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Dancing+Script:wght@700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #ffffff; color: #111827; }
        .hero-title { font-size: 4rem; line-height: 1.1; font-weight: 800; letter-spacing: -0.02em; color: #111827; }
        .handwritten { font-family: 'Dancing Script', cursive; color: #00A1DE; }
        .highlight-orange { background: #FFAD33; padding: 0 12px; border-radius: 8px; display: inline-block; transform: rotate(-1deg); color: #111827; }
        .wave-bottom { position: absolute; bottom: 0; left: 0; width: 100%; height: 250px; background: #f8fafc; clip-path: ellipse(80% 100% at 50% 100%); z-index: -1; }
        .app-card { background: white; border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.04); transition: all 0.3s ease; border: 1px solid #f1f5f9; }
        .app-card:hover { transform: translateY(-10px); box-shadow: 0 20px 50px rgba(0,0,0,0.08); }
        [x-cloak] { display: none !important; }
    </style>
</head>
<body x-data="{ openLogin: false }">

    <nav class="flex justify-between items-center px-12 py-6 border-b border-gray-50 bg-white sticky top-0 z-50">
        <div class="flex items-center gap-10">
            <h1 class="text-2xl font-bold text-[#875A7B]">A-Smart<span class="text-gray-900">ERP</span></h1>
            <div class="hidden lg:flex gap-8 text-sm font-medium text-gray-500">
                <a href="#" class="hover:text-[#875A7B]">Apps</a>
                <a href="#" class="hover:text-[#875A7B]">Solutions</a>
                <a href="#" class="hover:text-[#875A7B]">Support</a>
            </div>
        </div>
        <div class="flex items-center gap-5">
            <button @click="openLogin = true" class="text-sm font-bold text-gray-600 hover:text-[#875A7B]">Sign in</button>
            <button @click="openLogin = true" class="bg-[#875A7B] text-white px-6 py-2.5 rounded text-sm font-bold shadow-md hover:bg-[#6b4762]">Try it free</button>
        </div>
    </nav>

    <section class="relative pt-24 pb-32 text-center px-6 min-h-[80vh]">
        <div class="max-w-4xl mx-auto">
            <h2 class="hero-title animate__animated animate__fadeInDown">
                All your business on <br>
                <span class="highlight-orange">one platform.</span>
            </h2>
            <p class="text-4xl font-light mt-10 italic text-gray-700">
                Simple, efficient, yet <span class="handwritten underline decoration-sky-400 decoration-2">affordable!</span>
            </p>

            <div class="mt-12 flex justify-center gap-5">
                <button @click="openLogin = true" class="bg-[#875A7B] text-white px-10 py-5 rounded-lg text-lg font-bold shadow-xl hover:scale-105 transition-all">Start now - It's free</button>
                <button class="bg-gray-100 text-gray-700 px-10 py-5 rounded-lg text-lg font-bold hover:bg-gray-200 transition-all">Meet an advisor</button>
            </div>

            <div class="mt-20 inline-flex items-center gap-3 bg-white border rounded-full px-6 py-2.5 shadow-sm text-sm">
                <img src="https://flagcdn.com/in.svg" class="w-5"> 
                <span class="font-medium text-gray-600">Business Management Solution - Punjab</span> 
                <span class="text-gray-300">|</span> 
                <span class="font-bold text-[#875A7B]">Connect Now →</span>
            </div>
        </div>
        <div class="wave-bottom"></div>
    </section>

    <div x-show="openLogin" x-cloak class="fixed inset-0 z-[100] flex items-center justify-center p-6">
        <div @click="openLogin = false" class="absolute inset-0 bg-black/50 backdrop-blur-sm"></div>
        <div class="relative bg-white w-full max-w-md rounded-3xl p-10 shadow-2xl animate__animated animate__zoomIn">
            <div class="text-center mb-10">
                <h3 class="text-2xl font-extrabold text-[#875A7B]">Account Access</h3>
                <p class="text-gray-400 text-xs font-bold uppercase mt-2 tracking-widest">Atharv Tech Co. Infrastructure</p>
            </div>
            <form method="POST" class="space-y-6">
                <div class="space-y-1">
                    <label class="text-[10px] font-bold text-gray-400 uppercase ml-2">Username</label>
                    <input type="text" name="username" placeholder="admin" required class="w-full bg-gray-50 p-4 rounded-xl border focus:ring-2 ring-purple-100 outline-none font-medium">
                </div>
                <div class="space-y-1">
                    <label class="text-[10px] font-bold text-gray-400 uppercase ml-2">Password</label>
                    <input type="password" name="password" placeholder="••••••••" required class="w-full bg-gray-50 p-4 rounded-xl border focus:ring-2 ring-purple-100 outline-none font-medium">
                </div>
                <button type="submit" class="w-full bg-[#875A7B] text-white p-5 rounded-2xl font-bold uppercase tracking-widest shadow-xl hover:bg-[#6b4762] transition-all">
                    Login to Terminal
                </button>
            </form>
        </div>
    </div>
</body>
</html>
