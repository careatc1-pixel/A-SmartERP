<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delivery Challan | A-SmartERP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; }
        .input-focus { border-bottom: 2px solid #e2e8f0; transition: all 0.3s; }
        .input-focus:focus { border-bottom-color: #10b981; outline: none; }
    </style>
</head>
<body class="p-6 md:p-12">
    <div class="max-w-4xl mx-auto bg-white shadow-2xl rounded-[2.5rem] overflow-hidden border border-slate-100" x-data="challanSystem()">
        
        <div class="p-6 bg-emerald-50 border-b flex justify-between items-center">
            <div class="flex items-center gap-3 text-emerald-600">
                <i class="fa-solid fa-truck-fast text-2xl"></i>
                <span class="text-xs font-black uppercase tracking-widest">Inventory Dispatch Terminal</span>
            </div>
            <a href="/sales/hub" class="bg-white px-4 py-2 rounded-xl text-xs font-bold text-slate-500 hover:text-slate-900 transition-all">EXIT</a>
        </div>

        <div class="p-10 md:p-16">
            <div class="flex justify-between items-start mb-12">
                <div>
                    <h1 class="text-3xl font-black text-slate-900 uppercase">Atharv Tech Co.</h1>
                    <p class="text-xs font-bold text-emerald-600 mt-1">DELIVERY CHALLAN</p>
                </div>
                <div class="text-right">
                    <p class="text-[10px] font-black text-slate-400 uppercase">Challan No</p>
                    <p class="text-xl font-bold text-slate-900" x-text="dcNo"></p>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-8 mb-12">
                <div>
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 block">Consignee (Bill To)</label>
                    <input list="custList" x-model="clientName" placeholder="Search Customer..." class="w-full text-lg font-bold text-slate-800 bg-transparent input-focus py-2">
                    <datalist id="custList">
                        {% for c in customers %}
                        <option value="{{ c.name }}">
                        {% endfor %}
                    </datalist>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 block">Vehicle No</label>
                        <input type="text" x-model="vehicleNo" placeholder="DL 1S XX 0000" class="w-full font-bold text-slate-800 bg-transparent input-focus py-2 uppercase">
                    </div>
                    <div>
                        <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 block">Dispatch Date</label>
                        <p class="py-2 font-bold text-slate-700" x-text="today"></p>
                    </div>
                </div>
            </div>

            <table class="w-full mb-8">
                <thead>
                    <tr class="text-[10px] font-black text-slate-400 uppercase border-b">
                        <th class="py-4 text-left">Item Description</th>
                        <th class="py-4 text-center w-24">Quantity</th>
                        <th class="py-4 text-right w-10"></th>
                    </tr>
                </thead>
                <tbody>
                    <template x-for="(item, index) in items" :key="index">
                        <tr class="border-b border-slate-50">
                            <td class="py-4"><input type="text" x-model="item.name" class="w-full font-semibold outline-none" placeholder="Enter product name..."></td>
                            <td class="py-4 text-center"><input type="number" x-model.number="item.qty" class="w-full text-center font-bold text-emerald-600 outline-none"></td>
                            <td class="py-4 text-right">
                                <button @click="removeItem(index)" class="text-slate-200 hover:text-red-500"><i class="fa-solid fa-circle-xmark"></i></button>
                            </td>
                        </tr>
                    </template>
                </tbody>
            </table>
            <button @click="addItem()" class="text-[10px] font-black text-emerald-600 uppercase tracking-widest">+ Add Item</button>

            <button @click="saveChallan()" class="w-full bg-slate-900 text-white p-5 rounded-2xl font-black uppercase tracking-widest mt-16 hover:bg-emerald-600 shadow-xl transition-all">
                Generate & Print Challan
            </button>
        </div>
    </div>

    <script>
        function challanSystem() {
            return {
                dcNo: 'DC/' + Date.now().toString().slice(-5),
                clientName: '',
                vehicleNo: '',
                today: new Date().toLocaleDateString('en-GB'),
                items: [{ name: '', qty: 1 }],
                addItem() { this.items.push({ name: '', qty: 1 }) },
                removeItem(i) { if(this.items.length > 1) this.items.splice(i, 1) },
                saveChallan() {
                    if(!this.clientName) return alert('Select Customer');
                    alert('Challan Saved & Syncing to Inventory...');
                    window.print();
                }
            }
        }
    </script>
</body>
</html>
