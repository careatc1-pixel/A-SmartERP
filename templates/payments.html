<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Entry | A-SmartERP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body class="p-6 bg-slate-50" x-data="paymentSystem()">
    <div class="max-w-2xl mx-auto bg-white rounded-[2rem] shadow-xl p-10 border border-slate-100">
        <div class="flex items-center gap-4 mb-10">
            <div class="w-12 h-12 bg-green-100 text-green-600 rounded-xl flex items-center justify-center text-xl">
                <i class="fa-solid fa-cash-register"></i>
            </div>
            <h2 class="text-2xl font-black text-slate-900 italic">Payment <span class="text-green-600">Entry</span></h2>
        </div>

        <div class="space-y-6">
            <div>
                <label class="text-[10px] font-black text-slate-400 uppercase block mb-2">Customer Name</label>
                <input list="custList" x-model="payData.client" class="w-full p-4 bg-slate-50 rounded-xl border-none outline-none font-bold focus:ring-2 focus:ring-green-500">
                <datalist id="custList">
                    {% for c in customers %}
                    <option value="{{ c.name }}">
                    {% endfor %}
                </datalist>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="text-[10px] font-black text-slate-400 uppercase block mb-2">Amount Received</label>
                    <input type="number" x-model="payData.amount" class="w-full p-4 bg-slate-50 rounded-xl outline-none font-black text-green-600 text-xl" placeholder="₹ 0.00">
                </div>
                <div>
                    <label class="text-[10px] font-black text-slate-400 uppercase block mb-2">Payment Mode</label>
                    <select x-model="payData.mode" class="w-full p-4 bg-slate-50 rounded-xl outline-none font-bold">
                        <option value="Cash">Cash</option>
                        <option value="UPI">UPI / QR</option>
                        <option value="Bank">Bank Transfer</option>
                    </select>
                </div>
            </div>

            <div>
                <label class="text-[10px] font-black text-slate-400 uppercase block mb-2">Reference / Transaction No.</label>
                <input type="text" x-model="payData.ref" class="w-full p-4 bg-slate-50 rounded-xl outline-none" placeholder="UTR / Check No.">
            </div>

            <button @click="recordPayment()" class="w-full bg-green-600 text-white p-5 rounded-2xl font-black uppercase tracking-widest hover:bg-black transition-all shadow-lg">
                Confirm Payment Receipt
            </button>
        </div>
    </div>

    <script>
        function paymentSystem() {
            return {
                payData: { client: '', amount: '', mode: 'UPI', ref: '' },
                recordPayment() {
                    if(!this.payData.client || !this.payData.amount) return alert('Fill all details');
                    alert('Payment recorded in Ledger!');
                    location.href = '/sales/hub';
                }
            }
        }
    </script>
</body>
</html>
